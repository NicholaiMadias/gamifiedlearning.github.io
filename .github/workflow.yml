name: Amazing Grace CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the site in the jekyll/builder container
      run:version: 2
updates:
  # Monitor GitHub Actions for the Autopilot
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "Nexus-Security"

  # Monitor NPM for Minifiers (Terser/Clean-CSS)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "D.D.T.O.-Optimization"
|<div class="nexus-card p-6 border-t-4 border-blue-500 mt-8">
    <h2 class="terminal text-2xl mb-4 text-blue-400">System Admin Log // Project 525730475864</h2>
    <div id="admin-log-stream" class="bg-black p-4 h-48 overflow-y-auto border border-zinc-800 text-[10px] font-mono leading-tight">
        <p class="text-blue-500">[SYSTEM] Initializing Log Stream...</p>
        <p class="text-zinc-500">[IDLE] Waiting for next D.D.T.O. trigger...</p>
    </div>
    <div class="mt-4 flex justify-between items-center text-[10px] uppercase tracking-widest text-zinc-500">
        <span>Status: <span class="text-nexus-green">Autonomous</span></span>
        <span>Uptime: 100%</span>
    </div>
</div>

<script>
    // Simple logic to fetch your latest GitHub Activity for the log
    async function fetchAdminLogs() {
        const logStream = document.getElementById('admin-log-stream');
        try {
            const response = await fetch('https://api.github.com/repos/NicholaiMadias/gamifiedlearning.github.io/commits');
            const commits = await response.json();
            logStream.innerHTML = commits.slice(0, 5).map(c => 
                `<p class="mb-1"><span class="text-nexus-green">[${c.commit.author.date.split('T')[1].replace('Z','')}]</span> ${c.commit.message}</p>`
            ).join('');
        } catch (e) {
            logStream.innerHTML = "<p class='text-red-500'>[ERROR] Failed to sync with GitHub API.</p>";
        }
    }
    // Refresh log every 60 seconds
    setInterval(fetchAdminLogs, 60000);
    fetchAdminLogs();
</script>

        docker run \
        -v ${{ github.workspace }}:/srv/jekyll -v ${{ github.workspace }}/_site:/srv/jekyll/_site \
        jekyll/builder:latest /bin/bash -c "chmod -R 777 /srv/jekyll && jekyll build --future"
