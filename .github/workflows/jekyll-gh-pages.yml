# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v4
    
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Deployment job
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
name: Dual Deploy to gamifiedlearning.org and amazinggracehomeliving.com

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Validate CNAME for this repository
        run: |
          REPO="${{ github.repository }}"

          case "$REPO" in
            "NicholaiMadias/gamifiedlearning.github.io")
              EXPECTED="gamifiedlearning.org"
              SECONDARY="amazinggracehomeliving.com"
              ;;
            "NicholaiMadias/Amazing-Grace")
              EXPECTED="amazinggracehomeliving.com"
              ;;
            *)
              echo "Unknown repository: $REPO"
              exit 1
              ;;
          esac

          if [ -f docs/CNAME ]; then
            ACTUAL=$(cat docs/CNAME)
            if [ "$ACTUAL" != "$EXPECTED" ] && [ "$ACTUAL" != "$SECONDARY" ]; then
              echo "CNAME mismatch: expected '$EXPECTED' or '$SECONDARY' but found '$ACTUAL'"
              exit 1
            fi
          fi

      - name: Prepare deployment for gamifiedlearning.org
        run: |
          mkdir -p deploy-glo
          cp -R dist/* deploy-glo/
          echo "gamifiedlearning.org" > deploy-glo/CNAME

      - name: Prepare deployment for amazinggracehomeliving.com (redirect)
        run: |
          mkdir -p deploy-aghl
          cp -R dist/* deploy-aghl/
          echo "amazinggracehomeliving.com" > deploy-aghl/CNAME

          cat > deploy-aghl/index.html <<EOF
<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="refresh" content="0; url=https://gamifiedlearning.org">
  </head>
  <body></body>
</html>
EOF

      # GitHub Pages supports only one deployed site per repository.
      # Keep the single default Pages artifact upload above (`path: ./_site`)
      # and handle any redirect/secondary domain from a separate Pages repo
      # or via DNS/CDN configuration instead of a second deploy here.
