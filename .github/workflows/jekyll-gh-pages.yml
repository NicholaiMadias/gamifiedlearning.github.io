# This workflow validates the Jekyll build on pull requests.
# GitHub Pages deployment is handled exclusively by dual-deploy.yml.
name: Validate Jekyll Build

on:
  pull_request:
    branches: ["main"]

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v4
        with:
          source: ./
          destination: ./_site
