# GitHub Pages PR Preview
#
# Builds the site on every non-draft PR push and deploys the output to a
# dedicated subdirectory on the gh-pages branch so each PR gets its own
# live preview URL:
#
#   https://<owner>.github.io/<repo>/pr-<number>/
#
# For user/organization pages repos (<owner>.github.io), the URL is:
#
#   https://<owner>.github.io/pr-<number>/
#
# On PR close (merge or abandon) the subdirectory is removed automatically.
#
# No external secrets are required — only GITHUB_TOKEN is used.
#
# Note: for preview URLs to resolve, GitHub Pages must be configured to serve
# from the gh-pages branch (Settings → Pages → Source).

name: GitHub Pages PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && !github.event.pull_request.draft

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -av \
            --exclude 'dist' \
            --exclude '.git' \
            --exclude '.github' \
            ./ dist/

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: preview: deploy PR #${{ github.event.pull_request.number }} @ ${{ github.sha }}

      - name: Post / update preview comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const owner = context.repo.owner.toLowerCase();
            const repo = context.repo.repo;

            const isUserPagesRepo = repo.toLowerCase() === `${owner}.github.io`;
            const baseUrl = isUserPagesRepo
              ? `https://${owner}.github.io`
              : `https://${owner}.github.io/${repo}`;
            const previewUrl = `${baseUrl}/pr-${prNumber}/`;

            const body = [
              '## 🔍 GitHub Pages Preview',
              '',
              `✅ Preview deployed for \\`${sha}\\`:`,
              `👉 **${previewUrl}**`,
              '',
              '*This comment is updated automatically on each push.*',
              `*Last updated: ${new Date().toUTCString()}*`,
            ].join('\\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, per_page: 100 },
            );
            const existing = comments.find(c =>
              c.body?.includes('GitHub Pages Preview') && c.user?.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    name: Clean Up Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "cleanup: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No preview directory found for PR #${{ github.event.pull_request.number }} — nothing to remove."
          fi

