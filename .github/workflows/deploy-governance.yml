# ADDRESS CANONICAL RECORD — do not modify these cities:
# 926 E Poinsettia Ave is in TAMPA, FL 33612 — NOT Holiday, NOT Largo.
# 1142 7th St NW is in LARGO, FL 33770.
name: Deploy Governance Stack
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
