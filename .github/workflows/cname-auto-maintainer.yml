name: CNAME Auto‑Maintainer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cname-maintainer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine expected CNAME
        id: cname
        run: |
          REPO="${{ github.repository }}"
          EXPECTED=""

          case "$REPO" in
            "NicholaiMadias/gamifiedlearning.github.io")
              EXPECTED="gamifiedlearning.org"
              ;;
            "NicholaiMadias/amazinggracehomeliving.github.io")
              EXPECTED="amazinggracehomeliving.com"
              ;;
            *)
              echo "No case arm exists for repo: $REPO"
              echo "EXPECTED=" >> $GITHUB_OUTPUT
              exit 0
              ;;
          esac

          echo "EXPECTED=$EXPECTED" >> $GITHUB_OUTPUT

      - name: Skip validation if EXPECTED is empty
        if: ${{ steps.cname.outputs.EXPECTED == '' }}
        run: |
          echo "Skipping validation — no case arm configured."
          echo "A PR will be created to add the missing case arm."

      - name: Validate CNAME file
        if: ${{ steps.cname.outputs.EXPECTED != '' }}
        run: |
          EXPECTED="${{ steps.cname.outputs.EXPECTED }}"

          if [ ! -f CNAME ]; then
            echo "CNAME file missing — skipping validation."
            exit 0
          fi

          ACTUAL=$(cat CNAME | tr -d '\n\r')

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "CNAME mismatch."
            echo "Expected: $EXPECTED"
            echo "Actual:   $ACTUAL"
            exit 1
          fi

          echo "CNAME validation passed."

      - name: Auto-detect domain from DNS if missing
        id: autodomain
        if: ${{ steps.cname.outputs.EXPECTED == '' }}
        run: |
          REPO="${{ github.repository }}"
          DOMAIN=$(dig +short CNAME "$REPO" | sed 's/\.$//')

          if [ -z "$DOMAIN" ]; then
            DOMAIN="ADD_DOMAIN_HERE"
          fi

          echo "DOMAIN=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Auto‑PR missing case arm
        if: ${{ steps.cname.outputs.EXPECTED == '' }}
        run: |
          BRANCH="add-cname-case-${{ github.run_id }}"
          FILE=".github/workflows/cname-auto-maintainer.yml"
          DOMAIN="${{ steps.autodomain.outputs.DOMAIN }}"

          git checkout -b "$BRANCH"

          sed -i "/case \"\\\$REPO\" in/a \ \ \ \ \"${{ github.repository }}\")\n \ \ \ \ \ \ EXPECTED=\"$DOMAIN\"\n \ \ \ \ \ \ ;;\n" "$FILE"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add "$FILE"
          git commit -m "Auto-add missing CNAME case arm for ${{ github.repository }}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Auto-add CNAME case arm for ${{ github.repository }}" \
            --body "This PR was automatically generated because no case arm existed for this repository. Domain auto-detected as: $DOMAIN" \
            --base main \
            --head "$BRANCH"

      - name: Auto-update dual-deploy.yml
        if: ${{ steps.cname.outputs.EXPECTED == '' }}
        run: |
          BRANCH2="update-dual-deploy-${{ github.run_id }}"
          FILE2=".github/workflows/dual-deploy.yml"
          DOMAIN="${{ steps.autodomain.outputs.DOMAIN }}"

          git checkout -b "$BRANCH2"

          sed -i "/# AUTO-DOMAINS/a \ \ - $DOMAIN" "$FILE2"

          git add "$FILE2"
          git commit -m "Auto-update dual-deploy.yml with new domain: $DOMAIN"
          git push origin "$BRANCH2"

          gh pr create \
            --title "Auto-update dual-deploy.yml with new domain" \
            --body "Automatically added $DOMAIN to dual-deploy.yml domain list." \
            --base main \
            --head "$BRANCH2"

      - name: Auto-sync domain to WordPress
        if: ${{ steps.cname.outputs.EXPECTED == '' }}
        run: |
          DOMAIN="${{ steps.autodomain.outputs.DOMAIN }}"
          echo "Syncing new domain to WordPress: $DOMAIN"
          curl --retry 3 --fail -X POST \
            -H "Authorization: Bearer ${WP_API_KEY}" \
            -d "{\"domain\": \"$DOMAIN\"}" \
            https://www.amazinggracehomeliving.com/wp-json/nexus-sync/v1/add-domain || true
