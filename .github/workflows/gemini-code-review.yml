name: Gemini Code Review
on: [pull_request]
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/run-gemini-cli@v1
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          # This tells Gemini to act as a senior reviewer
          prompt: "Review this PR for security, performance, and Node/React best practices. Focus specifically on Firestore rule compliance and React performance optimization in the Game loop."
