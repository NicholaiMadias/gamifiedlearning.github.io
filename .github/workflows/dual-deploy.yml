name: Dual Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  deploy:
    # Only deploy on direct pushes to main, not on PRs
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate CNAME
        run: |
          if [ ! -f CNAME ]; then
            echo "CNAME file not found at repo root"
            exit 1
          fi
          ACTUAL=$(tr -d '[:space:]' < CNAME)
          EXPECTED="amazinggracehomeliving.com"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "CNAME mismatch: expected '$EXPECTED' but found '$ACTUAL'"
            exit 1
          fi
          echo "CNAME validated: $ACTUAL"

      - name: Build static site
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -av --exclude 'dist' --exclude '.git' --exclude '.github' ./ dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Sync to WordPress (Gamified Learning)
        env:
          WP_API_KEY: ${{ secrets.WP_API_KEY }}
        run: |
          test -f dist/index.html
          CONTENT=$(jq -Rs . < dist/index.html)
          curl -sSf \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WP_API_KEY}" \
            -d "{\"content\": ${CONTENT}}" \
            https://www.gamifiedlearning.org/wp-json/nexus-sync/v1/update

  # ── Gemini AI Code Review ────────────────────────────────────────────────────
  # Runs in parallel with the deploy job on pull requests.
  # Does NOT block the build — failures are informational only.
  gemini-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini AI Code Review
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Collect the diff (JS, HTML, CSS only; cap at 30 000 chars for the API)
          DIFF=$(git diff "origin/${BASE_REF}..HEAD" -- '*.js' '*.html' '*.css' \
                 | head -c 30000)

          if [ -z "$DIFF" ]; then
            echo "No JS/HTML/CSS changes to review."
            exit 0
          fi

          PROMPT="You are an expert code reviewer for a browser-based game written in vanilla JS/HTML/CSS. \
Review the following git diff for: \
1) Security vulnerabilities (XSS, injection, etc.) \
2) Performance issues (unnecessary reflows, large loops, memory leaks) \
3) General code quality (naming, logic, error handling). \
Be concise and actionable. If there are no issues, say so."

          # Combine prompt and diff, then JSON-encode with jq for safety
          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg diff "$DIFF" \
            '{contents:[{parts:[{text: ($prompt + "\n\n```diff\n" + $diff + "\n```")}]}]}')

          RESPONSE=$(curl -sSf \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            | jq -r '.candidates[0].content.parts[0].text // "Review unavailable — check Gemini API key."')

          gh pr comment "$PR_NUMBER" --body "## 🤖 Gemini AI Code Review

${RESPONSE}

---
*This review was generated automatically and is informational only.*"
