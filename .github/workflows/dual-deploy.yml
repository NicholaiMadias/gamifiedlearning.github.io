name: Dual Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate CNAME
        run: |
          if [ ! -f CNAME ]; then
            echo "CNAME file not found at repo root"
            exit 1
          fi
          ACTUAL=$(tr -d '[:space:]' < CNAME)
          EXPECTED="amazinggracehl.org"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "CNAME mismatch: expected '$EXPECTED' but found '$ACTUAL'"
            exit 1
          fi
          echo "CNAME validated: $ACTUAL"

      - name: Build static site
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -av --exclude 'dist' --exclude '.git' --exclude '.github' ./ dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
