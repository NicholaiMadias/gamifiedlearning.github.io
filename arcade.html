<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Arcade — Star Matrix</title>
  <link rel="icon" type="image/png" href="./assets/logo-S7NXL_ug.png" />
  <meta http-equiv="refresh" content="0; url=./arcade/star-matrix/" />
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #e2e8f0;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 60%, #020617 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .page-shell {
      width: min(100%, 820px);
      padding: 1rem;
    }
    .top-bar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 0.75rem;
    }
    .back-link {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover,
    .back-link:focus-visible {
      color: #f8fafc;
      text-decoration: underline;
    }
    .card {
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 16px;
      background: rgba(15,23,42,0.55);
      padding: 1.25rem;
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    p {
      margin: 0.25rem 0 0;
      color: rgba(226,232,240,0.75);
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="top-bar">
      <a class="back-link" href="./arcade/">← Back to Arcade</a>
    </div>
    <div class="card">
      <h1>Star Matrix</h1>
      <p>This route has been consolidated into the unified Star Matrix experience.</p>
      <p><a class="back-link" href="./arcade/star-matrix/">Continue to Star Matrix →</a></p>
    </div>
  </div>
  <script>
    (function () {
      try {
        window.location.replace('./arcade/star-matrix/');
      } catch (_) {
        window.location.href = './arcade/star-matrix/';
      }
    })();
  </script>
</body>
</html>
