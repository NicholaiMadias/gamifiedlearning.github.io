    <script>
        // ── Tab switching — Fix 3: getTabConfig / handleTabKeydown / setupTabs ──
        function getTabConfig() {
            return {
                story: {
                    tab: document.getElementById('tab-story'),
                    panel: document.getElementById('story-section'),
                    display: 'flex'
                },
                quiz: {
                    tab: document.getElementById('tab-quiz'),
                    panel: document.getElementById('quiz-section'),
                    display: 'block'
                }
            };
        }

        function switchTab(name, options) {
            options = options || {};
            var focusTab   = options.focusTab   || false;
            var focusPanel = options.focusPanel || false;
            var tabs       = getTabConfig();
            var isStory    = name === 'story';
            var activeName   = isStory ? 'story' : 'quiz';
            var inactiveName = isStory ? 'quiz'  : 'story';
            var active   = tabs[activeName];
            var inactive = tabs[inactiveName];

            // Fix 2: toggle hidden alongside aria-selected
            active.panel.style.display = active.display;
            active.panel.hidden = false;
            inactive.panel.style.display = 'none';
            inactive.panel.hidden = true;

            active.tab.classList.add('active');
            inactive.tab.classList.remove('active');

            active.tab.setAttribute('aria-selected', 'true');
            inactive.tab.setAttribute('aria-selected', 'false');
            // Fix 3: roving tabindex
            active.tab.setAttribute('tabindex', '0');
            inactive.tab.setAttribute('tabindex', '-1');

            if (focusTab) {
                active.tab.focus();
            } else if (focusPanel) {
                active.panel.focus();
            }
        }

        function handleTabKeydown(event) {
            var tabNames = ['story', 'quiz'];
            var currentIndex = tabNames.indexOf(event.currentTarget.id === 'tab-story' ? 'story' : 'quiz');
            var nextIndex = currentIndex;

            switch (event.key) {
                case 'ArrowRight':
                case 'ArrowDown':
                    nextIndex = (currentIndex + 1) % tabNames.length;
                    break;
                case 'ArrowLeft':
                case 'ArrowUp':
                    nextIndex = (currentIndex - 1 + tabNames.length) % tabNames.length;
                    break;
                case 'Home':
                    nextIndex = 0;
                    break;
                case 'End':
                    nextIndex = tabNames.length - 1;
                    break;
                case 'Enter':
                case ' ':
                case 'Spacebar':
                    event.preventDefault();
                    switchTab(tabNames[currentIndex], { focusTab: true });
                    return;
                default:
                    return;
            }

            event.preventDefault();
            switchTab(tabNames[nextIndex], { focusTab: true });
        }

        function setupTabs() {
            var tabs = getTabConfig();
            var storyTab = tabs.story.tab;
            var quizTab  = tabs.quiz.tab;

            [storyTab, quizTab].forEach(function (tab) {
                if (!tab) return;
                tab.addEventListener('keydown', handleTabKeydown);
                tab.addEventListener('click', function () {
                    switchTab(tab.id === 'tab-story' ? 'story' : 'quiz', { focusTab: true });
                });
            });

            // Determine which tab starts active
            var initialTab = (quizTab &&
                (quizTab.getAttribute('aria-selected') === 'true' || quizTab.classList.contains('active')))
                ? 'quiz'
                : 'story';

            switchTab(initialTab);
        }

        // ── Story chapter and quiz data (loaded from external module) ──
        // See: bible-journey-data.js

        var currentPage = 0;
        var imageCache = {};
        // Pre-populate imageCache from the static chapter images
        chapters.forEach(function (ch, i) { imageCache[i] = ch.image || null; });

        function showImage(src, alt) {
            var img = document.getElementById('chapter-img');
            img.src = src;
            img.alt = alt;
            img.style.display = 'block';
            document.getElementById('image-placeholder').style.display = 'none';
        }

        function showImagePlaceholder(icon, label) {
            var placeholder = document.getElementById('image-placeholder');
            placeholder.innerHTML = '<span class="icon">' + icon + '</span><span>' + label + '</span>';
            placeholder.style.display = 'flex';
            document.getElementById('chapter-img').style.display = 'none';
        }

        // Fix 4: gamified error with title, body, hint, and technical code
        function showError(title, body, hint, code) {
            var el = document.getElementById('story-error');
            document.getElementById('story-error-title').textContent = title || '';
            document.getElementById('story-error-body').textContent = body || '';
            document.getElementById('story-error-hint').textContent = hint || '';
            document.getElementById('story-error-code').textContent = code ? '⚙ ' + code : '';
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('story-error').style.display = 'none';
        }

        // ── Chapter rendering ──────────────────────────────────────────
        function renderChapter(index) {
            var ch = chapters[index];
            document.getElementById('chapter-counter').textContent =
                'Chapter ' + (index + 1) + ' / ' + chapters.length;
            document.getElementById('story-title').textContent = ch.title;
            document.getElementById('story-content').textContent = ch.content;
            document.getElementById('btn-prev').disabled = index === 0;
            document.getElementById('btn-next').disabled = index === chapters.length - 1;

            // Dots
            var track = document.getElementById('dot-track');
            track.innerHTML = '';
            chapters.forEach(function (_, i) {
                var dot = document.createElement('span');
                dot.className = 'dot' + (i === index ? ' active' : '');
                dot.setAttribute('aria-label', 'Chapter ' + (i + 1));
                track.appendChild(dot);
            });

            // Image
            hideError();
            if (imageCache[index]) {
                showImage(imageCache[index], ch.title);
            } else {
                showImagePlaceholder('⭐', 'No image for this chapter');
            }
        }

        function nextChapter() {
            if (currentPage < chapters.length - 1) {
                currentPage++;
                renderChapter(currentPage);
            }
        }

        function prevChapter() {
            if (currentPage > 0) {
                currentPage--;
                renderChapter(currentPage);
            }
        }

        // ── Quiz data & logic ──────────────────────────────────────────

        var qIdx = 0;

        function renderComplete() {
            var quizBox = document.getElementById('quiz-box');
            var heading = document.createElement('h2');
            heading.className = 'complete-heading';
            heading.textContent = 'Journey Complete!';

            var restartBtn = document.createElement('button');
            restartBtn.className = 'btn btn-restart';
            restartBtn.textContent = '↺ Restart';
            restartBtn.addEventListener('click', function () { qIdx = 0; buildQuizShell(); loadQ(); });

            quizBox.replaceChildren(heading, restartBtn);
        }

        function buildQuizShell() {
            var quizBox = document.getElementById('quiz-box');
            quizBox.innerHTML = [
                '<h2>✝ Bible Journey</h2>',
                '<div class="progress-bar-track">',
                '<div class="progress-bar-fill" id="progress-bar" style="width:0%"',
                '     role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>',
                '</div>',
                '<p id="q-text"></p>',
                '<p id="feedback" aria-live="polite"></p>',
                '<div id="q-options"></div>'
            ].join('');
        }

        function setProgress(value) {
            var bar = document.getElementById('progress-bar');
            if (!bar) return;
            bar.style.width = value + '%';
            bar.setAttribute('aria-valuenow', value);
        }

        function loadQ() {
            if (qIdx >= qData.length) {
                setProgress(100);
                renderComplete();
                return;
            }

            setProgress(Math.round((qIdx / qData.length) * 100));
            document.getElementById('q-text').textContent = qData[qIdx].question;
            document.getElementById('feedback').textContent = '';

            var opt = document.getElementById('q-options');
            opt.innerHTML = '';
            qData[qIdx].answers.forEach(function (answer, i) {
                var btn = document.createElement('button');
                btn.className = 'btn';
                btn.textContent = answer;
                btn.addEventListener('click', (function (capturedIdx) {
                    return function () {
                        if (i === qData[capturedIdx].correctIndex) {
                            qIdx++;
                            loadQ();
                        } else {
                            document.getElementById('feedback').textContent = '✗ Try again!';
                        }
                    };
                })(qIdx));
                opt.appendChild(btn);
            });
        }

        // ── Chapter nav button handlers ────────────────────────────────
        document.getElementById('btn-prev').addEventListener('click', prevChapter);
        document.getElementById('btn-next').addEventListener('click', nextChapter);

        // ── Init ───────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function () {
            setupTabs();
            renderChapter(0);
            loadQ();
