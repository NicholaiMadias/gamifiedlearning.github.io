<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Maia — Autonomy (Type O) — 12-spike Radiant Burst Corona -->
  <g fill="var(--star-maia-core)" stroke="var(--star-maia-glow)" stroke-width="4">
    <circle cx="64" cy="64" r="18"/>
    <g stroke-linecap="round">
      <!-- Long spikes at 0°, 30°, 60°, 90°, 120°, 150°, 180°, 210°, 240°, 270°, 300°, 330° -->
      <!-- 0° top -->
      <line x1="64" y1="8" x2="64" y2="30"/>
      <!-- 30° -->
      <line x1="96" y1="18" x2="83" y2="35"/>
      <!-- 60° -->
      <line x1="118" y1="46" x2="101" y2="53"/>
      <!-- 90° right -->
      <line x1="120" y1="64" x2="98" y2="64"/>
      <!-- 120° -->
      <line x1="118" y1="82" x2="101" y2="75"/>
      <!-- 150° -->
      <line x1="96" y1="110" x2="83" y2="93"/>
      <!-- 180° bottom -->
      <line x1="64" y1="120" x2="64" y2="98"/>
      <!-- 210° -->
      <line x1="32" y1="110" x2="45" y2="93"/>
      <!-- 240° -->
      <line x1="10" y1="82" x2="27" y2="75"/>
      <!-- 270° left -->
      <line x1="8" y1="64" x2="30" y2="64"/>
      <!-- 300° -->
      <line x1="10" y1="46" x2="27" y2="53"/>
      <!-- 330° -->
      <line x1="32" y1="18" x2="45" y2="35"/>
    </g>
  </g>
</svg>
