    <line x1="4"  y1="17" x2="11" y2="20" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
    <line x1="4"  y1="33" x2="11" y2="30" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
