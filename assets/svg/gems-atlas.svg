    <line x1="25" y1="9"  x2="25" y2="12" stroke="#8090A8" stroke-width="1.2" opacity="0.70"/>
    <line x1="25" y1="38" x2="25" y2="41" stroke="#8090A8" stroke-width="1.2" opacity="0.70"/>
    <line x1="9"  y1="25" x2="12" y2="25" stroke="#8090A8" stroke-width="1.2" opacity="0.70"/>
    <line x1="38" y1="25" x2="41" y2="25" stroke="#8090A8" stroke-width="1.2" opacity="0.70"/>
