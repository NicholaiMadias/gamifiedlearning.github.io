<svg xmlns="http://www.w3.org/2000/svg"
     style="position:absolute;width:0;height:0;overflow:hidden"
     aria-hidden="true"
     focusable="false">

  <defs>

    <!-- ── Alcyone (Emerald step-cut, Pure Gold) ── -->
    <radialGradient id="ga-alcyone-grad" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#FFFFF5"/>
      <stop offset="40%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A87800"/>
    </radialGradient>
    <filter id="ga-alcyone-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Celaeno (Halo/cabochon, Moonstone Silver) ── -->
    <radialGradient id="ga-celaeno-grad" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#F8F8FC"/>
      <stop offset="45%"  stop-color="#8090A8"/>
      <stop offset="100%" stop-color="#303444"/>
    </radialGradient>
    <radialGradient id="ga-celaeno-inner" cx="38%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#C8CCD8"/>
      <stop offset="100%" stop-color="#7880A0"/>
    </radialGradient>
    <filter id="ga-celaeno-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Electra (Brilliant-cut octagon, Ice Blue/Sapphire) ── -->
    <radialGradient id="ga-electra-grad" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#F2F9FF"/>
      <stop offset="45%"  stop-color="#5EB4FF"/>
      <stop offset="100%" stop-color="#0855C8"/>
    </radialGradient>
    <filter id="ga-electra-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Maia (Round brilliant, Electric Violet) ── -->
    <radialGradient id="ga-maia-grad" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#F0ECFF"/>
      <stop offset="45%"  stop-color="#8A38FF"/>
      <stop offset="100%" stop-color="#3800D0"/>
    </radialGradient>
    <filter id="ga-maia-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Merope (Heart cut, Vivid Ruby) ── -->
    <radialGradient id="ga-merope-grad" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#FFE8E0"/>
      <stop offset="40%"  stop-color="#E83820"/>
      <stop offset="100%" stop-color="#6C0010"/>
    </radialGradient>
    <filter id="ga-merope-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Sterope (Princess/square cut, Warm Gold) ── -->
    <radialGradient id="ga-sterope-grad" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#FFFDF0"/>
      <stop offset="40%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#8C5800"/>
    </radialGradient>
    <filter id="ga-sterope-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

