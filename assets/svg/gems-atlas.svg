    <line x1="46" y1="17" x2="39" y2="20" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
    <line x1="46" y1="33" x2="39" y2="30" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
    <line x1="37" y1="41" x2="33" y2="36" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
