    <line x1="48" y1="25" x2="41" y2="25" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
    <line x1="2"  y1="25" x2="9"  y2="25" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
