<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <!-- Merope — M-type — Vivid Ruby — Virtue: Humility — Gem: Heart cut -->
  <defs>
    <radialGradient id="gGemMerope" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#FFE8E0"/>
      <stop offset="40%"  stop-color="#E83820"/>
      <stop offset="100%" stop-color="#6C0010"/>
    </radialGradient>
    <filter id="glowGemMerope" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Heart body -->
  <path d="M 25,42 C 7,31 4,14 14,10 C 18,8 22,11 25,16 C 28,11 32,8 36,10 C 46,14 43,31 25,42 Z"
        fill="url(#gGemMerope)" stroke="#500010" stroke-width="1.5" filter="url(#glowGemMerope)"/>
  <!-- Inner facet table -->
  <path d="M 25,36 C 12,27 11,17 18,14 C 21,13 24,16 25,19 C 26,16 29,13 32,14 C 39,17 38,27 25,36 Z"
        fill="#FFE0D8" opacity="0.50"/>
  <!-- Centre cleft line -->
  <line x1="25" y1="10" x2="25" y2="19" stroke="#FFFFFF" stroke-width="0.9" opacity="0.70"/>
  <!-- Side facet lines (left lobe) -->
  <line x1="14" y1="10" x2="18" y2="14" stroke="#FFFFFF" stroke-width="0.8" opacity="0.60"/>
  <line x1="4"  y1="20" x2="11" y2="17" stroke="#FFFFFF" stroke-width="0.8" opacity="0.60"/>
  <line x1="5"  y1="33" x2="12" y2="27" stroke="#FFFFFF" stroke-width="0.8" opacity="0.60"/>
  <!-- Side facet lines (right lobe) -->
  <line x1="36" y1="10" x2="32" y2="14" stroke="#FFFFFF" stroke-width="0.8" opacity="0.60"/>
  <line x1="46" y1="20" x2="39" y2="17" stroke="#FFFFFF" stroke-width="0.8" opacity="0.60"/>
  <line x1="45" y1="33" x2="38" y2="27" stroke="#FFFFFF" stroke-width="0.8" opacity="0.60"/>
  <!-- Specular highlight (upper-left lobe) -->
  <ellipse cx="18" cy="14" rx="3.5" ry="2.2" fill="#FFFFFF" opacity="0.45"/>
</svg>
