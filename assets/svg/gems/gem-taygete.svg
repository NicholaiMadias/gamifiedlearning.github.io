<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <!-- Taygete — B-type — Electric Navy — Virtue: Courage — Gem: Marquise cut (pointed oval) -->
  <defs>
    <radialGradient id="gGemTaygete" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#D0E8FF"/>
      <stop offset="45%"  stop-color="#1060FF"/>
      <stop offset="100%" stop-color="#000EA0"/>
    </radialGradient>
    <filter id="glowGemTaygete" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Marquise body (pointed at top & bottom) -->
  <polygon points="25,3 37,9 46,17 48,25 46,33 37,41 25,47 13,41 4,33 2,25 4,17 13,9"
           fill="url(#gGemTaygete)" stroke="#000C88" stroke-width="1.5" filter="url(#glowGemTaygete)"/>
  <!-- Inner table highlight -->
  <polygon points="25,10 33,14 39,20 41,25 39,30 33,36 25,40 17,36 11,30 9,25 11,20 17,14"
           fill="#C0D8FF" opacity="0.55"/>
  <!-- Axial facet lines (tips to table) -->
  <line x1="25" y1="3"  x2="25" y2="10" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="25" y1="47" x2="25" y2="40" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="48" y1="25" x2="41" y2="25" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="2"  y1="25" x2="9"  y2="25" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <!-- Diagonal facet lines -->
  <line x1="37" y1="9"  x2="33" y2="14" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
  <line x1="46" y1="17" x2="39" y2="20" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
  <line x1="46" y1="33" x2="39" y2="30" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
  <line x1="37" y1="41" x2="33" y2="36" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
  <line x1="13" y1="9"  x2="17" y2="14" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
  <line x1="4"  y1="17" x2="11" y2="20" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
  <line x1="4"  y1="33" x2="11" y2="30" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
  <line x1="13" y1="41" x2="17" y2="36" stroke="#FFFFFF" stroke-width="0.7" opacity="0.55"/>
  <!-- Specular highlight (upper-left) -->
  <ellipse cx="17" cy="14" rx="4" ry="2.5" fill="#FFFFFF" opacity="0.45"/>
</svg>
