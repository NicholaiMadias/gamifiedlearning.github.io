<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <!-- Maia — O-type — Electric Violet — Virtue: Autonomy — Gem: Round brilliant with radiating facets -->
  <defs>
    <radialGradient id="gGemMaia" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#F0ECFF"/>
      <stop offset="45%"  stop-color="#8A38FF"/>
      <stop offset="100%" stop-color="#3800D0"/>
    </radialGradient>
    <filter id="glowGemMaia" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer girdle circle -->
  <circle cx="25" cy="25" r="22"
          fill="url(#gGemMaia)" stroke="#2800B0" stroke-width="1.5" filter="url(#glowGemMaia)"/>
  <!-- Inner table octagon -->
  <polygon points="25,13 32,17 36,25 32,33 25,37 18,33 14,25 18,17"
           fill="#E8E0FF" opacity="0.55"/>
  <!-- 8 radiating facet lines (girdle to table vertices) -->
  <line x1="25"  y1="3"   x2="25"  y2="13"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="40.6" y1="9.4"  x2="32"  y2="17"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="47"  y1="25"  x2="36"  y2="25"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="40.6" y1="40.6" x2="32"  y2="33"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="25"  y1="47"  x2="25"  y2="37"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="9.4" y1="40.6" x2="18"  y2="33"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="3"   y1="25"  x2="14"  y2="25"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="9.4" y1="9.4"  x2="18"  y2="17"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <!-- Specular highlight (upper-left) -->
  <ellipse cx="17" cy="13" rx="4.5" ry="3" fill="#FFFFFF" opacity="0.45"/>
</svg>
