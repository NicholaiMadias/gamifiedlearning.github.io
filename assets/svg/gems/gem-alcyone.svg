<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <!-- Alcyone — F-type — Pure Gold — Virtue: Serenity — Gem: Emerald/step cut (elongated octagon) -->
  <defs>
    <radialGradient id="gGemAlcyone" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#FFFFF5"/>
      <stop offset="40%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A87800"/>
    </radialGradient>
    <filter id="glowGemAlcyone" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer step-cut octagon -->
  <polygon points="16,3 34,3 45,11 47,25 45,39 34,47 16,47 5,39 3,25 5,11"
           fill="url(#gGemAlcyone)" stroke="#906000" stroke-width="1.5" filter="url(#glowGemAlcyone)"/>
  <!-- Middle step ring -->
  <polygon points="19,9 31,9 39,15 41,25 39,35 31,41 19,41 11,35 9,25 11,15"
           fill="none" stroke="#FFFFFF" stroke-width="0.9" opacity="0.60"/>
  <!-- Inner table -->
  <polygon points="20,14 30,14 36,20 37,25 36,30 30,36 20,36 14,30 13,25 14,20"
           fill="#FFFBE0" opacity="0.55"/>
  <!-- Step facet diagonals -->
  <line x1="16" y1="3"  x2="19" y2="9"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="34" y1="3"  x2="31" y2="9"  stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="45" y1="11" x2="39" y2="15" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="47" y1="25" x2="41" y2="25" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="45" y1="39" x2="39" y2="35" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="34" y1="47" x2="31" y2="41" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="16" y1="47" x2="19" y2="41" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="5"  y1="39" x2="11" y2="35" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="3"  y1="25" x2="9"  y2="25" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <line x1="5"  y1="11" x2="11" y2="15" stroke="#FFFFFF" stroke-width="0.8" opacity="0.65"/>
  <!-- Specular highlight -->
  <ellipse cx="16" cy="12" rx="4.5" ry="2.8" fill="#FFFFFF" opacity="0.45"/>
</svg>
