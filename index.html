<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamified Learning</title>
  <style>
    /* ── Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 1.5rem 1rem 3rem;
    }

    h1.app-title {
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00ff41;
      text-shadow: 0 0 10px #00ff4180;
    }

    /* ── Guide HUD ───────────────────────────────── */
    .guide-card {
      background: #0d0d1a;
      border: 1px solid #1a1a2e;
      border-radius: 12px;
      padding: 1rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .guide-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .guide-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.7rem;
      background: radial-gradient(circle, #0f172a 0%, #0a0f1d 100%);
      border: 1px solid #1f2a44;
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.15);
    }

    .guide-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .guide-title {
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #00ff41;
    }

    .guide-mode-label {
      font-size: 0.82rem;
      color: #b3b3c2;
    }

    .guide-mode-btn {
      margin-left: auto;
      background: linear-gradient(90deg, #0f2f1f, #0f2f2f);
      border: 1px solid #00ff4160;
      color: #e0ffe4;
      padding: 0.35rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s ease;
    }

    .guide-mode-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 255, 65, 0.18);
      background: linear-gradient(90deg, #134e4a, #0f2f2f);
    }

    .guide-log {
      background: #0b1020;
      border: 1px solid #1c2a3c;
      border-radius: 10px;
      padding: 0.75rem;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.85rem;
    }

    .guide-log-line {
      color: #e5e7eb;
      line-height: 1.3;
    }

    .archivist-glitch {
      filter: hue-rotate(180deg) brightness(1.2) contrast(1.2);
      background: repeating-linear-gradient(
        0deg,
        rgba(59, 130, 246, 0.1),
        rgba(59, 130, 246, 0.1) 1px,
        transparent 1px,
        transparent 2px
      );
      border-radius: 50%;
    }

    /* ── Match Maker ──────────────────────────────── */
    .match-card {
      background: #0d0d1a;
      border: 1px solid #1a1a2e;
      border-radius: 12px;
      padding: 1rem;
      width: 100%;
      max-width: 460px;
    }

    .match-card h2 {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00ff41;
      margin-bottom: 0.6rem;
    }

    .match-stats {
      display: flex;
      justify-content: space-around;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.8rem;
    }

    .match-stats span { color: #00ff41; font-weight: 700; }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.4rem;
      padding: 0.8rem;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .match-cell {
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      background: #111;
      box-shadow: 0 0 6px rgba(0,0,0,0.6);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      user-select: none;
    }

    .match-cell:hover { transform: scale(1.08); box-shadow: 0 0 10px rgba(0,255,65,0.3); }
    .match-cell:active { transform: scale(0.94); }

    .match-badge-banner {
      text-align: center;
      font-size: 0.9rem;
      color: #00ff41;
      background: #001a00;
      border: 1px solid #00ff4160;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      margin-top: 0.6rem;
    }

    .match-badge-banner.hidden { display: none; }

    .match-restart-btn {
      display: block;
      margin: 0.8rem auto 0;
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      padding: 0.4rem 1.4rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }

    .match-restart-btn:hover { background: #00ff4120; }

    /* ── Matrix of Conscience ─────────────────────── */
    .matrix-card {
      background: #0d0d1a;
      border-radius: 12px;
      padding: 1.2rem;
      width: 100%;
      max-width: 460px;
    }

    .matrix-border { border: 1px solid #1a2a3a; }

    .matrix-heading {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4fc3f7;
      margin-bottom: 1rem;
    }

    .matrix-economy-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .matrix-cell {
      background: #111827;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .matrix-cell .icon { font-size: 1.6rem; }

    .matrix-cell .label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64b5f6;
    }

    .matrix-cell .value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0e0e0;
    }

    .matrix-cell .bar-track {
      width: 100%;
      height: 4px;
      background: #1e3a5f;
      border-radius: 2px;
      overflow: hidden;
    }

    .matrix-cell .bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #1565c0, #4fc3f7);
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>

  <h1 class="app-title">Gamified Learning</h1>

  <!-- ══ Guide HUD ══════════════════════════════════ -->
  <section class="guide-card" id="guide-panel">
    <div class="guide-header">
      <div id="guide-avatar" class="guide-avatar" aria-label="Guide avatar">🛰️</div>
      <div class="guide-info">
        <div class="guide-title">Guide</div>
        <div class="guide-mode-label" id="guide-mode-label">Mode: Sage</div>
        <button class="guide-mode-btn" id="guide-mode-toggle" type="button">Switch Mode</button>
      </div>
    </div>
    <div class="guide-log" id="guide-log">
      <div class="guide-log-line">Guide initializing...</div>
    </div>
  </section>

  <!-- ══ Match Maker ══════════════════════════════════ -->
  <section class="match-card" id="match-maker-screen">
    <h2>Match Maker</h2>

    <div class="match-stats">
      <div>Score: <span id="match-score">0</span></div>
      <div>Moves: <span id="match-moves">20</span></div>
      <div>Level: <span id="match-level">1</span></div>
    </div>

    <div class="match-grid" id="match-grid"></div>

    <div id="match-badge-banner" class="match-badge-banner hidden"></div>

    <button class="match-restart-btn" id="match-restart-btn">↺ Restart</button>
  </section>

  <!-- ══ Matrix of Conscience ════════════════════════ -->
  <section class="matrix-card matrix-border" id="matrix-economy-screen">
    <h2 class="matrix-heading">Matrix of Conscience</h2>

    <div class="matrix-economy-grid">
      <div class="matrix-cell">
        <span class="icon">💖</span>
        <span class="label">Empathy</span>
        <span class="value" id="mc-empathy">72</span>
        <div class="bar-track"><div class="bar-fill" id="mc-empathy-bar" style="width:72%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">⚖️</span>
        <span class="label">Justice</span>
        <span class="value" id="mc-justice">58</span>
        <div class="bar-track"><div class="bar-fill" id="mc-justice-bar" style="width:58%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">🧠</span>
        <span class="label">Wisdom</span>
        <span class="value" id="mc-wisdom">45</span>
        <div class="bar-track"><div class="bar-fill" id="mc-wisdom-bar" style="width:45%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">🌱</span>
        <span class="label">Growth</span>
        <span class="value" id="mc-growth">83</span>
        <div class="bar-track"><div class="bar-fill" id="mc-growth-bar" style="width:83%"></div></div>
      </div>
    </div>
  </section>

  <script type="module" src="./main.js"></script>
</body>
</html>
