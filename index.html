<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamified Learning</title>
  <style>
    /* ── Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 1.5rem 1rem 3rem;
    }

    h1.app-title {
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00ff41;
      text-shadow: 0 0 10px #00ff4180;
    }

    /* ── Match Maker ──────────────────────────────── */
    .match-card {
      background: #0d0d1a;
      border: 1px solid #1a1a2e;
      border-radius: 12px;
      padding: 1rem;
      width: 100%;
      max-width: 460px;
    }

    .match-card h2 {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00ff41;
      margin-bottom: 0.6rem;
    }

    .match-stats {
      display: flex;
      justify-content: space-around;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.8rem;
    }

    .match-stats span { color: #00ff41; font-weight: 700; }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.4rem;
      padding: 0.8rem;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .gem-cell {
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      background: #111;
      box-shadow: 0 0 6px rgba(0,0,0,0.6);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      user-select: none;
      border: none;
    }

    .gem-cell:hover { transform: scale(1.08); box-shadow: 0 0 10px rgba(0,255,65,0.3); }
    .gem-cell:active { transform: scale(0.94); }
    .gem-cell.selected { box-shadow: 0 0 12px rgba(0,255,65,0.8); transform: scale(1.06); }
    .gem-cell.matched { opacity: 0.4; transform: scale(0.9); }

    .match-msg {
      text-align: center;
      font-size: 0.85rem;
      color: #00ff41;
      min-height: 1.2em;
      margin-top: 0.4rem;
    }

    .match-badge-banner {
      text-align: center;
      font-size: 0.9rem;
      color: #00ff41;
      background: #001a00;
      border: 1px solid #00ff4160;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      margin-top: 0.6rem;
    }

    .match-badge-banner.hidden { display: none; }

    .match-restart-btn {
      display: block;
      margin: 0.8rem auto 0;
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      padding: 0.4rem 1.4rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }

    .match-restart-btn:hover { background: #00ff4120; }

    /* ── Star Map ─────────────────────────────────── */
    .star-map-card {
      background: #0d0d1a;
      border: 1px solid #1a1a2e;
      border-radius: 12px;
      padding: 1rem;
      width: 100%;
      max-width: 460px;
    }

    .star-map-card h2 {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffd700;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 8px #ffd70060;
    }

    #star-map-container {
      display: flex;
      justify-content: center;
    }

    /* ── Matrix of Conscience ─────────────────────── */
    .matrix-card {
      background: #0d0d1a;
      border-radius: 12px;
      padding: 1.2rem;
      width: 100%;
      max-width: 460px;
    }

    .matrix-border { border: 1px solid #1a2a3a; }

    .matrix-heading {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4fc3f7;
      margin-bottom: 1rem;
    }

    .matrix-economy-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .matrix-cell {
      background: #111827;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .matrix-cell .icon { font-size: 1.6rem; }

    .matrix-cell .label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64b5f6;
    }

    .matrix-cell .value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0e0e0;
    }

    .matrix-cell .bar-track {
      width: 100%;
      height: 4px;
      background: #1e3a5f;
      border-radius: 2px;
      overflow: hidden;
    }

    .matrix-cell .bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #1565c0, #4fc3f7);
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>

  <h1 class="app-title">Gamified Learning</h1>

  <!-- ══ Match Maker ══════════════════════════════════ -->
  <section class="match-card" id="match-maker-screen">
    <h2>Match Maker</h2>

    <div class="match-stats">
      <div>Score: <span id="hud-score">0</span></div>
      <div>Moves: <span id="hud-moves">20</span></div>
      <div>Level: <span id="hud-level">1</span></div>
    </div>

    <div class="match-grid" id="match-board" role="grid" aria-label="Match Maker game board"></div>

    <p id="match-msg" class="match-msg" aria-live="polite"></p>

    <div id="match-badge-banner" class="match-badge-banner hidden" aria-live="polite"></div>

    <button class="match-restart-btn" id="restart-btn">↺ Restart</button>
  </section>

  <!-- ══ Mystery of the Seven Stars — Star Map ══════ -->
  <section class="star-map-card" id="star-map-screen">
    <h2>Mystery of the Seven Stars</h2>
    <div id="star-map-container"></div>
  </section>

  <!-- ══ Matrix of Conscience ════════════════════════ -->
  <section class="matrix-card matrix-border" id="matrix-economy-screen">
    <h2 class="matrix-heading">Matrix of Conscience</h2>

    <div class="matrix-economy-grid">
      <div class="matrix-cell">
        <span class="icon">💖</span>
        <span class="label" id="label-empathy">Empathy</span>
        <span class="value" id="pct-empathy">0%</span>
        <div class="bar-track" role="progressbar" aria-labelledby="label-empathy" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"><div class="bar-fill" id="bar-empathy" style="width:0%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">⚖️</span>
        <span class="label" id="label-justice">Justice</span>
        <span class="value" id="pct-justice">0%</span>
        <div class="bar-track" role="progressbar" aria-labelledby="label-justice" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"><div class="bar-fill" id="bar-justice" style="width:0%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">🧠</span>
        <span class="label" id="label-wisdom">Wisdom</span>
        <span class="value" id="pct-wisdom">0%</span>
        <div class="bar-track" role="progressbar" aria-labelledby="label-wisdom" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"><div class="bar-fill" id="bar-wisdom" style="width:0%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">🌱</span>
        <span class="label" id="label-growth">Growth</span>
        <span class="value" id="pct-growth">0%</span>
        <div class="bar-track" role="progressbar" aria-labelledby="label-growth" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"><div class="bar-fill" id="bar-growth" style="width:0%"></div></div>
      </div>
    </div>
  </section>

  <script type="module" src="./main.js"></script>
</body>
</html>
