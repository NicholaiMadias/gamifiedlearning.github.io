<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamified Learning</title>
  <style>
    /* ── Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 1.5rem 1rem 3rem;
    }

    h1.app-title {
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00ff41;
      text-shadow: 0 0 10px #00ff4180;
    }

    /* ── Match Maker ──────────────────────────────── */
    .match-card {
      background: #0d0d1a;
      border: 1px solid #1a1a2e;
      border-radius: 12px;
      padding: 1rem;
      width: 100%;
      max-width: 460px;
    }

    .match-card h2 {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00ff41;
      margin-bottom: 0.6rem;
    }

    .match-stats {
      display: flex;
      justify-content: space-around;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.8rem;
    }

    .match-stats span { color: #00ff41; font-weight: 700; }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.4rem;
      padding: 0.8rem;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .match-cell {
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      background: #111;
      box-shadow: 0 0 6px rgba(0,0,0,0.6);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      user-select: none;
    }

    .match-cell:hover { transform: scale(1.08); box-shadow: 0 0 10px rgba(0,255,65,0.3); }
    .match-cell:active { transform: scale(0.94); }

    .match-badge-banner {
      text-align: center;
      font-size: 0.9rem;
      color: #00ff41;
      background: #001a00;
      border: 1px solid #00ff4160;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      margin-top: 0.6rem;
    }

    .match-badge-banner.hidden { display: none; }

    .match-restart-btn {
      display: block;
      margin: 0.8rem auto 0;
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      padding: 0.4rem 1.4rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }

    .match-restart-btn:hover { background: #00ff4120; }

    /* ── Arcade Links ─────────────────────────────── */
    .arcade-links-card {
      background: #0d0d1a;
      border: 1px solid #1a2a1a;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      width: 100%;
      max-width: 460px;
    }

    .arcade-links-heading {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00ff41;
      text-shadow: 0 0 8px #00ff4160;
      margin-bottom: 0.8rem;
    }

    .arcade-link-btn {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .arcade-link-btn:hover {
      background: #00ff4115;
      box-shadow: 0 0 8px #00ff4140;
    }

    /* ── Bible Journey Quiz (inline) ──────────────── */
    .bj-quiz {
      margin-top: 1rem;
      border-top: 1px solid #1a2a1a;
      padding-top: 1rem;
    }

    .bj-progress-track {
      width: 100%;
      height: 4px;
      background: #1a2a1a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .bj-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00a82d, #00ff41);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    #bj-q-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #ccc;
      margin-bottom: 1rem;
      min-height: 2.5rem;
    }

    #bj-feedback {
      min-height: 1.2rem;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      color: #ff4c4c;
      margin-bottom: 0.6rem;
    }

    #bj-options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .bj-complete-heading {
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00ff41;
      text-shadow: 0 0 12px #00ff4190;
      text-align: center;
      margin-bottom: 0.8rem;
    }

    /* ── Matrix of Conscience ─────────────────────── */
    .matrix-card {
      background: #0d0d1a;
      border-radius: 12px;
      padding: 1.2rem;
      width: 100%;
      max-width: 460px;
    }

    .matrix-border { border: 1px solid #1a2a3a; }

    .matrix-heading {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4fc3f7;
      margin-bottom: 1rem;
    }

    .matrix-economy-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .matrix-cell {
      background: #111827;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .matrix-cell .icon { font-size: 1.6rem; }

    .matrix-cell .label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64b5f6;
    }

    .matrix-cell .value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0e0e0;
    }

    .matrix-cell .bar-track {
      width: 100%;
      height: 4px;
      background: #1e3a5f;
      border-radius: 2px;
      overflow: hidden;
    }

    .matrix-cell .bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #1565c0, #4fc3f7);
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>

  <h1 class="app-title">Gamified Learning</h1>

  <!-- ══ Match Maker ══════════════════════════════════ -->
  <section class="match-card" id="match-maker-screen">
    <h2>Match Maker</h2>

    <div class="match-stats">
      <div>Score: <span id="match-score">0</span></div>
      <div>Moves: <span id="match-moves">20</span></div>
      <div>Level: <span id="match-level">1</span></div>
    </div>

    <div class="match-grid" id="match-grid"></div>

    <div id="match-badge-banner" class="match-badge-banner hidden"></div>

    <button class="match-restart-btn" id="match-restart-btn">↺ Restart</button>
  </section>

  <!-- ══ Arcade ════════════════════════════════════════ -->
  <section class="arcade-links-card" id="arcade-links">
    <h2 class="arcade-links-heading">Arcade</h2>

    <!-- Bible Journey quiz (inline) -->
    <div class="bj-quiz" id="bj-quiz-box">
      <h3 style="text-align:center;font-size:0.95rem;letter-spacing:0.1em;text-transform:uppercase;color:#00ff41;text-shadow:0 0 8px #00ff4160;margin-bottom:1rem;">✝ Bible Journey</h3>
      <div class="bj-progress-track">
        <div class="bj-progress-fill" id="bj-progress-bar" style="width:0%"
             role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
      </div>
      <p id="bj-q-text"></p>
      <p id="bj-feedback" aria-live="polite"></p>
      <div id="bj-options"></div>
    </div>
  </section>

  <!-- ══ Matrix of Conscience ════════════════════════ -->
  <section class="matrix-card matrix-border" id="matrix-economy-screen">
    <h2 class="matrix-heading">Matrix of Conscience</h2>

    <div class="matrix-economy-grid">
      <div class="matrix-cell">
        <span class="icon">💖</span>
        <span class="label">Empathy</span>
        <span class="value" id="mc-empathy">72</span>
        <div class="bar-track"><div class="bar-fill" id="mc-empathy-bar" style="width:72%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">⚖️</span>
        <span class="label">Justice</span>
        <span class="value" id="mc-justice">58</span>
        <div class="bar-track"><div class="bar-fill" id="mc-justice-bar" style="width:58%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">🧠</span>
        <span class="label">Wisdom</span>
        <span class="value" id="mc-wisdom">45</span>
        <div class="bar-track"><div class="bar-fill" id="mc-wisdom-bar" style="width:45%"></div></div>
      </div>

      <div class="matrix-cell">
        <span class="icon">🌱</span>
        <span class="label">Growth</span>
        <span class="value" id="mc-growth">83</span>
        <div class="bar-track"><div class="bar-fill" id="mc-growth-bar" style="width:83%"></div></div>
      </div>
    </div>
  </section>

  <script type="module" src="./main.js"></script>
  <script>
    (function () {
      const bjData = [
        { question: "Who built the ark?", answers: ["Moses", "Noah", "David"], correctIndex: 1 },
        { question: "What is the first book of the Bible?", answers: ["Exodus", "Genesis", "Psalms"], correctIndex: 1 },
        { question: "How many disciples did Jesus have?", answers: ["10", "12", "7"], correctIndex: 1 }
      ];
      let bjIdx = 0;

      function bjSetProgress(value) {
        const bar = document.getElementById('bj-progress-bar');
        bar.style.width = value + '%';
        bar.setAttribute('aria-valuenow', value);
      }

      function bjRenderComplete() {
        const box = document.getElementById('bj-quiz-box');
        const heading = document.createElement('h3');
        heading.className = 'bj-complete-heading';
        heading.textContent = 'Journey Complete!';

        const btn = document.createElement('button');
        btn.className = 'arcade-link-btn';
        btn.style.marginTop = '0.8rem';
        btn.textContent = '↺ Play Again';
        btn.addEventListener('click', function () { bjIdx = 0; bjLoad(); });

        box.replaceChildren(heading, btn);
      }

      function bjLoad() {
        const box = document.getElementById('bj-quiz-box');

        if (!document.getElementById('bj-q-text')) {
          box.innerHTML = '<h3 style="text-align:center;font-size:0.95rem;letter-spacing:0.1em;text-transform:uppercase;color:#00ff41;text-shadow:0 0 8px #00ff4160;margin-bottom:1rem;">\u271D Bible Journey</h3><div class="bj-progress-track"><div class="bj-progress-fill" id="bj-progress-bar" style="width:0%" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div></div><p id="bj-q-text"></p><p id="bj-feedback" aria-live="polite"></p><div id="bj-options"></div>';
        }

        if (bjIdx >= bjData.length) {
          bjSetProgress(100);
          bjRenderComplete();
          return;
        }

        bjSetProgress(Math.round((bjIdx / bjData.length) * 100));
        document.getElementById('bj-q-text').textContent = bjData[bjIdx].question;
        document.getElementById('bj-feedback').textContent = '';

        const opts = document.getElementById('bj-options');
        opts.innerHTML = '';
        bjData[bjIdx].answers.forEach(function (answer, i) {
          const btn = document.createElement('button');
          btn.className = 'arcade-link-btn';
          btn.textContent = answer;
          btn.addEventListener('click', function () {
            if (i === bjData[bjIdx].correctIndex) {
              bjIdx++;
              bjLoad();
            } else {
              document.getElementById('bj-feedback').textContent = '\u2717 Try again!';
            }
          });
          opts.appendChild(btn);
        });
      }

      bjLoad();
    }());
  </script>
</body>
</html>
