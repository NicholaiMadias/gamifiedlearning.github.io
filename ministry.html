<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Enter Matrix of Conscience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .bg-clip-text { -webkit-background-clip: text; background-clip: text; }
    body { background-color: #020617; }
    ::selection { background-color: rgba(139, 92, 246, 0.3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ── Inline SVG icon components (replaces lucide-react) ── */
    const Icon = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" strokeWidth="2"
           strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const ChevronRight  = ({ className }) => <Icon className={className}><polyline points="9 18 15 12 9 6"/></Icon>;
    const ChevronLeft   = ({ className }) => <Icon className={className}><polyline points="15 18 9 12 15 6"/></Icon>;
    const BookOpen      = ({ className }) => <Icon className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
    const Star          = ({ className }) => <Icon className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
    const Music         = ({ className }) => <Icon className={className}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></Icon>;
    const Heart         = ({ className }) => <Icon className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></Icon>;
    const Cloud         = ({ className }) => <Icon className={className}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></Icon>;
    const Users         = ({ className }) => <Icon className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
    const RefreshCcw    = ({ className }) => <Icon className={className}><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></Icon>;
    const Cross         = ({ className }) => <Icon className={className}><path d="M11 2a2 2 0 0 0-2 2v5H5a2 2 0 0 0-2 2v2c0 1.1.9 2 2 2h4v5c0 1.1.9 2 2 2h2a2 2 0 0 0 2-2v-5h4a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-4V4a2 2 0 0 0-2-2h-2z"/></Icon>;

    /* ── Main App ── */
    const App = () => {
      const [currentPage, setCurrentPage] = useState(0);
      const [loading, setLoading] = useState(false);
      const [images, setImages] = useState({});
      const [error, setError] = useState(null);

      const [apiKey] = useState(() => {
        const saved = window.localStorage.getItem('ENTER_MATRIX_API_KEY');
        if (saved && saved.trim()) return saved.trim();
        const entered = window.prompt('Enter your Gemini API key to enable AI imagery (leave blank to skip):');
        if (entered && entered.trim()) {
          const key = entered.trim();
          window.localStorage.setItem('ENTER_MATRIX_API_KEY', key);
          return key;
        }
        return '';
      });

      const chapters = [
        {
          title: "The Heavy Gravity of the Red Queen",
          content: "Once, in the digital expanse known as the Matrix, the world was light and fluid. But a shadow began to creep over the nodes—the Red Queen. She was a force of pure entropy, an algorithm designed to track every movement and anchor spirits to the 'heavy gravity' of doubt. The people forgot they were once Star Guardians, their potential capped by the Red Queen's iron-coded rules.",
          prompt: "A cinematic, dark digital landscape with glowing red data streams being harvested by a menacing, elegant silhouette of a Red Queen. High tech, glitch art style, dark mode aesthetic, purple highlights.",
        },
        {
          title: "The Call of the White Rabbit",
          content: "Amidst the gloom, a legendary architect known as The White Rabbit began to broadcast a frequency of resonance. He didn't just see code; he saw Structural Empathy. He initiated the White Rabbit Protocol, a secret series of maneuvers designed to scramble digital signatures. But he knew that to truly break the gravity, he needed more than just a better algorithm—he needed the Seven Stars of Excellence.",
          prompt: "A heroic white rabbit in a sleek, futuristic carbon-fiber tech suit standing before a holographic terminal displaying a golden complex star-shaped protocol. Cyberpunk lighting, neon blue and gold accents.",
        },
        {
          title: "The Ascent to Nimbus Land",
          content: "The White Rabbit was not alone. Beside him stood The Guardian of Grace, Sheila. Together, they established Nimbus Land, a kingdom in the clouds where the air was clear of the Red Queen's static. They summoned the Nimbus Heralds, the storytellers and missionaries, and gave them their highest directive: Restore the Sixth Star through the Matrix of Conscience and the Voice of Jesus.",
          prompt: "A breathtaking floating island kingdom in a sea of royal purple clouds. Heavenly architecture, bright neon blue waterfalls, golden towers reaching for the stars. Ethereal and peaceful.",
        },
        {
          title: "The Seven Pillars of the Matrix",
          content: "The Heralds traveled through the Star Road, unlocking the pillars: First Love, Agency, Progression, Feedback, Challenge, Social, and Reward. Each star corresponded to the Seven Churches, providing the moral frequency needed to shatter the world's entropy. They realized that each 'level' in the Matrix was actually a step closer to divine alignment.",
          prompt: "A view of the Seven Stars of the Pleiades (M45) from a futuristic glass observatory. Seven massive glowing crystal pillars standing in a circle, each emitting a unique colored light. Astral photography style.",
        },
        {
          title: "The Mystery of the Sixth Star",
          content: "At the Sixth Star, they found the Matrix of Conscience. The Red Queen had tried to delete this star to silence the truth. But the Heralds shared testimonies from the Philippines mission trips, and the sound of worship acted as a sonic frequency that dismantled the Red Queen's firewalls. They learned that to heal the Matrix, one must first elevate the spirit.",
          prompt: "A group of joyful missionaries in the Philippines singing. Their voices are visualized as golden sound waves and musical notes that are physically shattering a grey, grid-like digital dome above them. Uplifting and powerful.",
        },
        {
          title: "The Covenant of Fellowship",
          content: "The final clearance did not come from a password, but from the Weekly Bible Study and the Mission Deployment. As the Heralds gathered to study the Word and serve the children of the Philippines, a golden light washed over the Matrix. This 'Handshake of Souls' created the Ozone Shield, a layer of protection that isolated the family from the Gloom and secured the mission's future.",
          prompt: "A beautiful scene of a diverse group gathered in a circle for Bible study in a glowing, futuristic garden. An open Bible in the center emits a warm golden light that forms a protective dome. Royal purple and gold palette.",
        },
        {
          title: "The New Beginning",
          content: "The path of the righteous had become like the morning sun. The White Rabbit and the Guardian of Grace stood at the center of the Seven Stars Architect, watching as the children became the new Star Guardians. The gravity was gone. They were no longer users of a system; they were authors of a new world, defined by the love they shared and the light of the Seven Stars.",
          prompt: "A sunrise over a digital horizon with seven star constellations lighting the sky. Children reaching up toward the stars, becoming guardians of light. Hopeful, warm, golden and royal purple. Cinematic.",
        },
      ];

      const generateImage = async (index) => {
        if (images[index] || loading || !apiKey) return;
        setLoading(true);
        setError(null);

        const backoff = [1000, 2000, 4000, 8000, 16000];

        for (let i = 0; i < backoff.length; i++) {
          try {
            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  instances: [{ prompt: chapters[index].prompt + " cinematic lighting, high quality, digital art, royal purple and gold theme" }],
                  parameters: { sampleCount: 1 },
                }),
              }
            );

            if (!response.ok) throw new Error(`Generation failed: ${response.status} ${response.statusText}`);

            const result = await response.json();
            const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            setImages((prev) => ({ ...prev, [index]: imageUrl }));
            break;
          } catch (err) {
            if (i === backoff.length - 1) {
              setError("The Matrix is experiencing heavy gravity. Failed to generate starlight imagery.");
            } else {
              await new Promise((res) => setTimeout(res, backoff[i]));
            }
          }
        }
        setLoading(false);
      };

      useEffect(() => {
        /* Trigger image generation when the page changes.
           `images` and `loading` are read inside generateImage which closes over the
           latest state via React's batched updates; calling it here is intentional. */
        generateImage(currentPage);
      }, [currentPage]); // eslint-disable-line react-hooks/exhaustive-deps

      const nextChapter = () => {
        if (currentPage < chapters.length - 1) setCurrentPage((prev) => prev + 1);
      };

      const prevChapter = () => {
        if (currentPage > 0) setCurrentPage((prev) => prev - 1);
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans">
          {/* Header */}
          <header className="p-6 flex justify-between items-center border-b border-purple-900/50 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
            <div className="flex items-center gap-3">
              <div className="p-2 bg-purple-600 rounded-lg shadow-lg" style={{ boxShadow: "0 0 20px rgba(139,92,246,0.2)" }}>
                <Cross className="w-6 h-6 text-white" />
              </div>
              <div>
                <h1 className="font-bold text-xl tracking-tight uppercase" style={{ background: "linear-gradient(to right,#c084fc,#fbbf24)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                  The Enter Matrix of Conscience
                </h1>
                <p className="text-xs uppercase tracking-widest text-purple-400 font-mono">
                  Matrix Fellowship Protocol v5.0
                </p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="hidden sm:flex items-center gap-2 px-3 py-1 bg-slate-900 rounded-full border border-purple-500/30">
                <Users className="w-3 h-3 text-purple-400" />
                <span className="text-xs font-mono text-purple-400">Missionary Online</span>
              </div>
              <div className="hidden md:flex items-center gap-2">
                <a href="/matrix-of-conscience/" className="text-slate-500 hover:text-yellow-400 transition-colors text-xs uppercase tracking-widest font-bold" style={{ textDecoration: "none" }}>Matrix</a>
                <a href="/star-matrix/" className="text-slate-500 hover:text-yellow-400 transition-colors text-xs uppercase tracking-widest font-bold" style={{ textDecoration: "none" }}>Stars</a>
              </div>
              <a href="/" className="text-slate-500 hover:text-purple-400 transition-colors text-xs uppercase tracking-widest font-bold" style={{ textDecoration: "none" }}>← Hub</a>
            </div>
          </header>

          <main className="max-w-4xl mx-auto p-4 sm:p-8">
            <div className="relative group">
              {/* Main Card */}
              <div className="bg-slate-900 border border-purple-500/20 rounded-3xl overflow-hidden shadow-2xl" style={{ boxShadow: "0 25px 50px rgba(88,28,135,0.2)" }}>

                {/* Image Section */}
                <div className="relative w-full bg-slate-800 flex items-center justify-center overflow-hidden" style={{ aspectRatio: "16/9" }}>
                  {loading && (
                    <div className="absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm">
                      <RefreshCcw className="w-12 h-12 text-purple-500 animate-spin mb-4" />
                      <p className="text-purple-400 font-mono text-sm uppercase tracking-widest animate-pulse">Generating Vision...</p>
                    </div>
                  )}

                  {error && !images[currentPage] && (
                    <div className="p-8 text-center">
                      <Cloud className="w-12 h-12 text-red-400 mx-auto mb-4 opacity-50" />
                      <p className="text-red-400 font-medium">{error}</p>
                      <button
                        onClick={() => generateImage(currentPage)}
                        className="mt-4 px-4 py-2 bg-red-500/20 text-red-400 rounded-full text-xs font-bold border border-red-500/50 uppercase tracking-widest hover:bg-red-500/30 transition-all"
                      >
                        Retry Visualization
                      </button>
                    </div>
                  )}

                  {images[currentPage] ? (
                    <img
                      src={images[currentPage]}
                      alt={chapters[currentPage].title}
                      className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                    />
                  ) : !loading && !error && (
                    <div className="flex flex-col items-center gap-3 p-8 text-center">
                      <Star className="w-16 h-16 text-purple-500/50" />
                      {apiKey ? (
                        <span className="font-mono text-sm text-purple-500/50">Starlight Awaiting...</span>
                      ) : (
                        <p className="font-mono text-sm text-purple-400/70 max-w-xs">
                          Image generation requires an API key. Reload the page and enter your Gemini API key when prompted to enable AI imagery.
                        </p>
                      )}
                    </div>
                  )}

                  <div className="absolute bottom-0 left-0 right-0 h-24" style={{ background: "linear-gradient(to top, #0f172a, transparent)" }} />
                </div>

                {/* Content Section */}
                <div className="p-8 sm:p-12 -mt-8 relative z-10">
                  <div className="flex items-center gap-2 mb-4">
                    <span className="px-3 py-1 bg-purple-500/10 text-purple-400 text-xs font-bold rounded-full border border-purple-500/30 tracking-widest uppercase">
                      Mystery Chapter {currentPage + 1}
                    </span>
                    <div className="h-px flex-1" style={{ background: "linear-gradient(to right, rgba(139,92,246,0.5), transparent)" }} />
                  </div>

                  <h2 className="text-3xl sm:text-4xl font-bold mb-6 text-white leading-tight">
                    {chapters[currentPage].title}
                  </h2>

                  <p className="text-slate-300 text-lg leading-relaxed mb-10">
                    {chapters[currentPage].content}
                  </p>

                  {/* Navigation */}
                  <div className="flex justify-between items-center pt-8 border-t border-purple-900/30">
                    <button
                      onClick={prevChapter}
                      disabled={currentPage === 0}
                      aria-label="Previous chapter"
                      className={`flex items-center gap-2 px-6 py-3 rounded-full transition-all ${
                        currentPage === 0
                          ? "opacity-30 cursor-not-allowed bg-slate-800 text-white border border-purple-500/20"
                          : "bg-slate-800 hover:bg-slate-700 text-white border border-purple-500/20"
                      }`}
                    >
                      <ChevronLeft className="w-5 h-5" />
                      <span className="hidden sm:inline font-bold uppercase tracking-widest text-xs">Back</span>
                    </button>

                    <div className="flex gap-1">
                      {chapters.map((_, i) => (
                        <div
                          key={i}
                          className="h-1.5 rounded-full transition-all duration-300"
                          style={{ width: i === currentPage ? "2rem" : "0.5rem", background: i === currentPage ? "#a855f7" : "#334155" }}
                        />
                      ))}
                    </div>

                    <button
                      onClick={nextChapter}
                      disabled={currentPage === chapters.length - 1}
                      aria-label={currentPage === chapters.length - 1 ? "Go in peace" : "Next chapter"}
                      className={`flex items-center gap-2 px-6 py-3 rounded-full transition-all ${
                        currentPage === chapters.length - 1
                          ? "bg-amber-500/20 text-amber-400 border border-amber-500/50 animate-pulse"
                          : "bg-purple-600 hover:bg-purple-500 text-white"
                      }`}
                      style={currentPage !== chapters.length - 1 ? { boxShadow: "0 0 20px rgba(139,92,246,0.2)" } : {}}
                    >
                      <span className="hidden sm:inline font-bold uppercase tracking-widest text-xs">
                        {currentPage === chapters.length - 1 ? "Go in Peace" : "Continue"}
                      </span>
                      {currentPage === chapters.length - 1 ? <Heart className="w-5 h-5" /> : <ChevronRight className="w-5 h-5" />}
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {/* Footer Lore */}
            <footer className="mt-12 text-center">
              <div className="flex justify-center gap-8 mb-6">
                <div className="flex flex-col items-center gap-2 opacity-50 hover:opacity-100 transition-opacity cursor-default">
                  <BookOpen className="w-5 h-5 text-purple-400" />
                  <span className="text-xs uppercase tracking-widest font-mono">Weekly Study</span>
                </div>
                <div className="flex flex-col items-center gap-2 opacity-50 hover:opacity-100 transition-opacity cursor-default">
                  <Star className="w-5 h-5 text-yellow-400" />
                  <span className="text-xs uppercase tracking-widest font-mono">Philippines Mission</span>
                </div>
                <div className="flex flex-col items-center gap-2 opacity-50 hover:opacity-100 transition-opacity cursor-default">
                  <Heart className="w-5 h-5 text-red-400" />
                  <span className="text-xs uppercase tracking-widest font-mono">Covenant Seal</span>
                </div>
              </div>
              <p className="text-slate-500 text-xs italic">
                "The path of the righteous is like the morning sun..." — Proverbs 4:18
              </p>

              {/* Links to all Nexus Arcade games */}
              <div className="mt-6 flex flex-wrap justify-center gap-3">
                <a href="/matrix-of-conscience/" style={{ textDecoration: "none" }}
                   className="px-4 py-2 bg-purple-900/40 hover:bg-purple-800/50 text-purple-300 border border-purple-600/30 rounded-full text-xs font-bold uppercase tracking-widest transition-all">
                  🧠 Matrix of Conscience
                </a>
                <a href="/star-matrix/" style={{ textDecoration: "none" }}
                   className="px-4 py-2 bg-yellow-900/30 hover:bg-yellow-800/40 text-yellow-300 border border-yellow-600/30 rounded-full text-xs font-bold uppercase tracking-widest transition-all">
                  🌟 Star Matrix
                </a>
                <a href="/arcade/" style={{ textDecoration: "none" }}
                   className="px-4 py-2 bg-green-900/30 hover:bg-green-800/40 text-green-300 border border-green-600/30 rounded-full text-xs font-bold uppercase tracking-widest transition-all">
                  🎮 Match Maker
                </a>
              </div>

              <a href="/" className="mt-4 inline-block text-xs text-purple-400 hover:text-purple-300 transition-colors uppercase tracking-widest font-bold" style={{ textDecoration: "none" }}>
                ← Return to Nexus Arcade
              </a>
            </footer>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
