<div class="module-container" id="mystery-meter-module">
  <h2 class="module-title">🌀 Mystery Meter</h2>
  <p class="module-status" id="mm-status">Fill the meter to unlock the NPC Village.</p>

  <div class="mm-gauge-wrap" aria-label="Mystery meter" role="meter" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="mm-gauge-wrap">
    <div class="mm-gauge-track">
      <div class="mm-gauge-fill" id="mm-gauge-fill" style="width:0%"></div>
    </div>
    <span class="mm-gauge-label" id="mm-gauge-label">0%</span>
  </div>

  <div class="mm-events" id="mm-events">
    <p class="mm-hint">Complete quests, earn badges, and collect combos to fill the meter.</p>
  </div>

  <div id="mm-banner" class="badge-banner hidden">🌟 Mystery Unlocked — NPC Village Revealed!</div>
</div>
