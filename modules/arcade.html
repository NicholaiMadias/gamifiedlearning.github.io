<div class="module-container" id="arcade-module">
  <h2 class="module-title">🔮 Divine Revelation Engine</h2>
  <p class="module-status" id="arcade-status">Match gems to charge the Revelation Engine.</p>

  <div class="arcade-stats">
    <div>Score: <span id="arcade-score">0</span></div>
    <div>Combo: <span id="arcade-combo">x1</span></div>
    <div>Tier: <span id="arcade-tier">1</span></div>
  </div>

  <div class="arcade-grid" id="arcade-grid" role="grid" aria-label="Gem grid"></div>

  <div class="arcade-charge">
    <div class="charge-track" role="progressbar" aria-label="Revelation charge" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div class="charge-fill" id="charge-fill" style="width:0%"></div>
    </div>
    <span id="charge-label">0% charged</span>
  </div>

  <div id="arcade-banner" class="badge-banner hidden">⚡ Divine Revelation Achieved!</div>

  <button class="primary-btn" id="arcade-restart-btn" style="margin-top:1rem;">↺ Reset</button>
</div>
