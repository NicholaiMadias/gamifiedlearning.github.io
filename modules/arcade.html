<section class="module-grid">
  <div class="card">
    <h2 class="module-heading">Arcade Match-3</h2>
    <p class="muted">Runs the match-maker engine with Nexus bus hooks. Combo tier 4 emits <code>combo-tier4</code> and drives rewards.</p>
  </div>

  <div class="match-card" id="match-maker-screen">
    <h2>Match Maker</h2>
    <div class="match-stats">
      <div>Score: <span id="match-score">0</span></div>
      <div>Moves: <span id="match-moves">20</span></div>
      <div>Level: <span id="match-level">1</span></div>
    </div>
    <div class="match-grid" id="match-grid"></div>
    <div id="match-badge-banner" class="match-badge-banner hidden"></div>
    <button class="match-restart-btn" id="match-restart-btn">↺ Restart</button>
  </div>

  <div class="card">
    <h3 class="module-heading">Combo Timeline</h3>
    <div id="combo-timeline"></div>
  </div>
</section>
