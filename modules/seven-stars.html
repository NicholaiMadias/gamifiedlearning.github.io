<div class="module-container" id="seven-stars-module">
  <h2 class="module-title">⭐ Seven Stars</h2>
  <p class="module-status" id="ss-status">Collect all seven stars to unlock the Revelation Engine.</p>

  <div class="ss-progress">
    <span id="ss-collected">0</span> / 7 stars collected
  </div>

  <div class="ss-grid" id="ss-grid">
    <button class="ss-star" data-star="Ephesus"    aria-label="Star of Ephesus">⭐<span>Ephesus</span></button>
    <button class="ss-star" data-star="Smyrna"     aria-label="Star of Smyrna">⭐<span>Smyrna</span></button>
    <button class="ss-star" data-star="Pergamum"   aria-label="Star of Pergamum">⭐<span>Pergamum</span></button>
    <button class="ss-star" data-star="Thyatira"   aria-label="Star of Thyatira">⭐<span>Thyatira</span></button>
    <button class="ss-star" data-star="Sardis"     aria-label="Star of Sardis">⭐<span>Sardis</span></button>
    <button class="ss-star" data-star="Philadelphia" aria-label="Star of Philadelphia">⭐<span>Philadelphia</span></button>
    <button class="ss-star" data-star="Laodicea"   aria-label="Star of Laodicea">⭐<span>Laodicea</span></button>
  </div>

  <div id="ss-banner" class="badge-banner hidden">🌟 All Seven Stars Collected!</div>
</div>
