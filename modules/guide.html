<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Guide</title>
  <link rel="stylesheet" href="guide.css" />
</head>
<body>
  <div class="guide">
    <div class="guide-title">⬡ Nexus Guide</div>
    <div id="guide-log" role="log" aria-live="polite" aria-label="Nexus Guide conversation log"></div>
    <div class="guide-input-row">
      <input
        id="guide-input"
        type="text"
        placeholder="Ask Nexus…"
        autocomplete="off"
        aria-label="Ask Nexus a question"
      />
      <button id="guide-send" aria-label="Send message">Send</button>
    </div>
  </div>
  <script src="guide.js"></script>
</body>
</html>
