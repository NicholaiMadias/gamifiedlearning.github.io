<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bible Journey | Gamified Learning</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem 3rem;
            gap: 1.5rem;
        }

        h1.app-title {
            font-size: 1.4rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #00ff41;
            text-shadow: 0 0 10px #00ff4180;
        }

        .quiz-card {
            background: #0d0d1a;
            border: 1px solid #1a2a1a;
            border-radius: 12px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        .quiz-card h2 {
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #00ff41;
            text-shadow: 0 0 8px #00ff4160;
            margin-bottom: 1.4rem;
        }

        #q-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 1.4rem;
            min-height: 2.5rem;
        }

        #q-options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .btn {
            width: 100%;
            padding: 0.75rem 1rem;
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .btn:hover {
            background: #00ff4115;
            box-shadow: 0 0 8px #00ff4140;
        }

        .btn:active { transform: scale(0.97); }

        .btn-restart {
            margin-top: 1.2rem;
            border-color: #4fc3f7;
            color: #4fc3f7;
        }

        .btn-restart:hover {
            background: #4fc3f715;
            box-shadow: 0 0 8px #4fc3f740;
        }

        #feedback {
            min-height: 1.4rem;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            color: #ff4c4c;
            margin-bottom: 0.8rem;
        }

        .progress-bar-track {
            width: 100%;
            height: 4px;
            background: #1a2a1a;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1.2rem;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00a82d, #00ff41);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .complete-heading {
            font-size: 1.3rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #00ff41;
            text-shadow: 0 0 14px #00ff4190;
            margin-bottom: 1rem;
        }

        a.back-link {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #555;
            text-decoration: none;
        }

        a.back-link:hover { color: #00ff41; }
    </style>
</head>
<body>
    <h1 class="app-title">Gamified Learning</h1>

    <div class="quiz-card" id="quiz-box">
        <h2>✝ Bible Journey</h2>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-bar" style="width:0%"
                 role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
        </div>
        <p id="q-text"></p>
        <p id="feedback" aria-live="polite"></p>
        <div id="q-options"></div>
    </div>

    <a class="back-link" href="index.html">← Back</a>

    <script>
        const qData = [
            { question: "Who built the ark?", answers: ["Moses", "Noah", "David"], correctIndex: 1 },
            { question: "What is the first book of the Bible?", answers: ["Exodus", "Genesis", "Psalms"], correctIndex: 1 },
            { question: "How many disciples did Jesus have?", answers: ["10", "12", "7"], correctIndex: 1 }
        ];

        let idx = 0;

        function renderComplete() {
            const quizBox = document.getElementById('quiz-box');
            const heading = document.createElement('h2');
            heading.className = 'complete-heading';
            heading.textContent = 'Journey Complete!';

            const restartBtn = document.createElement('button');
            restartBtn.className = 'btn btn-restart';
            restartBtn.textContent = '↺ Restart';
            restartBtn.addEventListener('click', () => { location.reload(); });

            quizBox.replaceChildren(heading, restartBtn);
        }

        function setProgress(value) {
            const bar = document.getElementById('progress-bar');
            bar.style.width = value + '%';
            bar.setAttribute('aria-valuenow', value);
        }

        function loadQ() {
            if (idx >= qData.length) {
                setProgress(100);
                renderComplete();
                return;
            }

            setProgress(Math.round((idx / qData.length) * 100));
            document.getElementById('q-text').textContent = qData[idx].question;
            document.getElementById('feedback').textContent = '';

            const opt = document.getElementById('q-options');
            opt.innerHTML = '';
            qData[idx].answers.forEach((answer, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.textContent = answer;
                btn.addEventListener('click', () => {
                    if (i === qData[idx].correctIndex) {
                        idx++;
                        loadQ();
                    } else {
                        document.getElementById('feedback').textContent = '✗ Try again!';
                    }
                });
                opt.appendChild(btn);
            });
        }

        loadQ();
    </script>
</body>
</html>
