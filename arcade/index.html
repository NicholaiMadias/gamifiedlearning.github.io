<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Match Maker | Nexus Arcade</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap');
    :root {
      --neon-blue:   #00f2ff;
      --neon-purple: #bc13fe;
      --deep-space:  #020617;
    }
    body { overflow-x: hidden; padding-bottom: 2rem; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .game-header {
      width: 100%; max-width: 560px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .game-header a { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; }
    .game-header a:first-child { color: var(--text-muted); }
    .game-header a:first-child:hover { color: var(--accent-blue); }
    .game-header a:last-child  { color: var(--accent-green); }
    .game-header a:last-child:hover { color: #56d364; }
    .game-title { font-family: 'Orbitron', monospace; font-size: 0.85rem; font-weight: 900; color: #fff; letter-spacing: 0.05em; }
    .cert-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(2,6,23,0.97); overflow-y: auto; padding: 1.5rem;
    }
    .cert-overlay.hidden { display: none !important; }
    .cert-overlay h2 { font-family: 'Orbitron', monospace; font-size: clamp(1.6rem, 5vw, 2.5rem); font-weight: 900; color: #fff; margin-bottom: 0.5rem; text-shadow: 0 0 20px #00f2ff; }
    .cert-overlay canvas { max-width: min(90vw, 800px); border: 1px solid rgba(0,242,255,0.2); border-radius: 8px; margin-bottom: 1.25rem; }
    .cert-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-bottom: 1.25rem; }
    .cert-btn {
      padding: 0.65rem 1.25rem; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1);
      background: rgba(15,23,42,0.8); font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.35rem; transition: border-color 0.2s, background 0.2s;
    }
    .cert-btn.blue   { color: #00f2ff; } .cert-btn.blue:hover   { border-color: #00f2ff; background: rgba(0,242,255,0.08); }
    .cert-btn.purple { color: #bc8cff; } .cert-btn.purple:hover { border-color: #bc8cff; background: rgba(188,140,255,0.08); }
    .cert-btn.green  { color: var(--accent-green); } .cert-btn.green:hover  { border-color: var(--accent-green); background: rgba(63,185,80,0.08); }
    .play-again-btn { background: none; border: none; color: var(--text-muted); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; cursor: pointer; margin-top: 0.5rem; }
    .play-again-btn:hover { color: var(--text-primary); }
  </style>
</head>
<body>
  <a class="skip-link" href="#match-grid">Skip to game board</a>

  <!-- Page header -->
  <div class="game-header">
    <a href="/">← Nexus Hub</a>
    <span class="game-title">MATCH MAKER</span>
    <a href="/arcade/certificates/">📜 Certificates</a>
  </div>

  <!-- HUD -->
  <div class="hud" role="status" aria-live="polite">
    <h1 class="hud-title">Match Maker</h1>
    <div class="hud-stats">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span id="match-score" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Level</span>
        <span id="match-level" class="stat-value">1</span>
      </div>
      <div class="stat">
        <span class="stat-label">Moves</span>
        <span id="match-moves" class="stat-value">20</span>
      </div>
    </div>
  </div>

  <!-- Badge banner -->
  <div id="match-badge-banner" class="badge-banner hidden" role="alert" aria-live="assertive"></div>

  <!-- Game message -->
  <p id="match-msg" class="game-msg" role="status" aria-live="polite"></p>

  <!-- Game board -->
  <div class="game-section">
    <div id="match-grid" class="match-grid" aria-label="Match Maker game board"></div>
  </div>

  <!-- Conscience meters -->
  <section class="conscience-panel glass-panel" style="background:var(--bg-surface);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.06);" aria-label="Conscience alignment">
    <h2>Conscience Alignment</h2>
    <div class="conscience-bars">
      <div class="conscience-row">
        <span class="conscience-label">Empathy</span>
        <div class="bar-track" role="progressbar" aria-label="Empathy" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="mc-empathy-bar" class="bar-fill bar-empathy" style="width:0%"></div>
        </div>
        <span id="mc-empathy" class="bar-pct">0%</span>
      </div>
      <div class="conscience-row">
        <span class="conscience-label">Justice</span>
        <div class="bar-track" role="progressbar" aria-label="Justice" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="mc-justice-bar" class="bar-fill bar-justice" style="width:0%"></div>
        </div>
        <span id="mc-justice" class="bar-pct">0%</span>
      </div>
      <div class="conscience-row">
        <span class="conscience-label">Wisdom</span>
        <div class="bar-track" role="progressbar" aria-label="Wisdom" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="mc-wisdom-bar" class="bar-fill bar-wisdom" style="width:0%"></div>
        </div>
        <span id="mc-wisdom" class="bar-pct">0%</span>
      </div>
      <div class="conscience-row">
        <span class="conscience-label">Growth</span>
        <div class="bar-track" role="progressbar" aria-label="Growth" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="mc-growth-bar" class="bar-fill bar-growth" style="width:0%"></div>
        </div>
        <span id="mc-growth" class="bar-pct">0%</span>
      </div>
    </div>
  </section>

  <!-- Star map -->
  <div id="star-map-container" class="glass-panel" style="width:100%;max-width:560px;background:var(--bg-surface);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.06);margin-top:0.5rem;" aria-label="Star progress map"></div>

  <!-- Controls -->
  <div class="controls">
    <button id="match-restart-btn" class="btn btn-primary">Restart</button>
  </div>

  <!-- Certificate overlay (shown after final level is cleared) -->
  <!-- Notification for pop-up blocked message -->
  <div id="mm-notification" class="hidden" hidden role="alert" aria-live="assertive"
    style="position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:300;
           background:rgba(22,27,34,0.95);border:1px solid rgba(0,242,255,0.3);
           color:#e2e8f0;font-size:0.75rem;padding:0.75rem 1.25rem;border-radius:var(--radius);
           max-width:90vw;text-align:center;"></div>

  <div id="mm-cert-overlay" class="cert-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="mm-cert-title">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:3.5rem;margin-bottom:0.75rem;" aria-hidden="true">🌟</div>
      <h2 id="mm-cert-title">MISSION COMPLETE!</h2>
      <p style="color:var(--accent-blue);font-size:0.65rem;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;margin-top:0.25rem;">All Levels Cleared</p>
    </div>

    <!-- Phase 1: Player name input -->
    <div id="mm-cert-name-phase" style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;margin-bottom:1rem;width:100%;max-width:360px;">
      <label for="mm-player-name" style="font-size:0.7rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;">Your name for the certificate</label>
      <input id="mm-player-name" type="text" maxlength="30" placeholder="Player"
        autocomplete="name" aria-label="Player name for certificate"
        style="width:100%;padding:0.6rem 1rem;background:var(--bg-card);border:1px solid rgba(255,255,255,0.1);
               border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.9rem;outline:none;"
        onkeydown="if(event.key==='Enter')document.getElementById('mm-gen-cert-btn').click()">
      <button id="mm-gen-cert-btn" class="btn btn-primary" style="width:100%;">Generate Certificate</button>
    </div>

    <!-- Phase 2: Certificate canvas + download buttons -->
    <div id="mm-cert-display-phase" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;">
      <canvas id="mm-cert-canvas" aria-label="Completion certificate" style="max-width:min(90vw,800px);border:1px solid rgba(0,242,255,0.2);border-radius:8px;"></canvas>
      <div class="cert-actions">
        <button class="cert-btn blue"   onclick="window._mmCertPNG && window._mmCertPNG()">⬇ Download PNG</button>
        <button class="cert-btn purple" onclick="window._mmCertPDF && window._mmCertPDF()">🖨 Save as PDF</button>
        <a class="cert-btn green" href="/arcade/certificates/">📜 My Certificates</a>
      </div>
    </div>

    <button class="play-again-btn" id="overlay-restart-btn">↩ Play Again</button>
  </div>

  <!-- Module bootstrap -->
  <script type="module">
    import { initMatchMaker, generateCertificateFor, downloadMatchMakerCertPNG, downloadMatchMakerCertPDF } from '/match-maker-ui.js';
    import { renderStarMap } from '/star-map.js';
    import { onGameLevelComplete } from '/concordance-lens.js';

    const starMapContainer = document.getElementById('star-map-container');
    function refreshStarMap() {
      if (starMapContainer) renderStarMap(starMapContainer);
    }

    initMatchMaker(null, null);
    refreshStarMap();

    const restartBtn = document.getElementById('match-restart-btn');
    if (restartBtn) {
      restartBtn.addEventListener('click', () => initMatchMaker(null, null));
    }

    const overlayRestartBtn = document.getElementById('overlay-restart-btn');
    if (overlayRestartBtn) {
      overlayRestartBtn.addEventListener('click', () => {
        document.getElementById('mm-cert-overlay').classList.add('hidden');
        initMatchMaker(null, null);
      });
    }

    // Handle certificate generation form submission
    document.getElementById('mm-gen-cert-btn').addEventListener('click', async () => {
      const btn        = document.getElementById('mm-gen-cert-btn');
      const playerName = document.getElementById('mm-player-name').value;
      btn.disabled     = true;
      btn.textContent  = 'Generating…';
      try {
        await generateCertificateFor(playerName);
        // Phase transition is handled inside generateCertificateFor via DOM IDs
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Generate Certificate';
      }
    });

    window.addEventListener('matchmaker-level-complete', e => {
      refreshStarMap();
      onGameLevelComplete(e.detail?.level ?? 1);
    });

    // Expose download helpers for inline onclick handlers
    window._mmCertPNG = downloadMatchMakerCertPNG;
    window._mmCertPDF = downloadMatchMakerCertPDF;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('/sw.js')
        .catch(err => console.warn('[SW] Registration skipped:', err.message));
    }
  </script>
</body>
</html>
