<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Arcade | Amazing Grace</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #020617;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .redirect-card {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(0, 242, 255, 0.3);
      padding: 3rem;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
    }
    h1 { margin: 0 0 1rem; color: #00f2ff; }
    p { color: #94a3b8; font-family: 'Inter', sans-serif; margin-bottom: 2rem; }
    .btn {
      background: rgba(188, 19, 254, 0.15);
      border: 1px solid #bc13fe;
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.2s;
    }
    .btn:hover { background: #bc13fe; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); }
  </style>
</head>
<body>
  <div class="redirect-card">
    <h1>ARCADE UNIFIED</h1>
    <p>All subsystems have been merged into the Central Matrix.</p>
    <a href="./matrix-of-conscience/" class="btn">Enter the Matrix</a>
  </div>
</body>
</html>
