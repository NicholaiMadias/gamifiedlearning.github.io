<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Matrix of Conscience — Nexus Arcade</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1.2rem;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    #hud .hud-group { display: flex; gap: 1rem; }

    #hud .hud-stat { display: flex; flex-direction: column; align-items: center; }
    #hud .hud-label { font-size: 0.65rem; color: #888; text-transform: uppercase; }
    #hud .hud-value { font-size: 1rem; font-weight: 700; color: #a060ff; }
    #hud .hud-value.moves { color: #4db8ff; }
    #hud .hud-value.level { color: #4dff88; }

    #hud a.back-link {
      color: #666;
      text-decoration: none;
      font-size: 0.75rem;
    }
    #hud a.back-link:hover { color: #aaa; }

    /* CERT bar */
    #cert-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      gap: 0;
      height: 6px;
    }

    #cert-bar .cert-seg {
      flex: 1;
      height: 100%;
      transition: opacity 0.3s;
    }

    #cert-bar .cert-seg.c { background: #A060FF; }
    #cert-bar .cert-seg.e { background: #4DB8FF; }
    #cert-bar .cert-seg.r { background: #4DFF88; }
    #cert-bar .cert-seg.t { background: #FFD84D; }

    /* Toast message */
    #toast {
      position: fixed;
      top: 60px; left: 50%; transform: translateX(-50%);
      z-index: 30;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #toast.visible { opacity: 1; }

    /* Game-over / win overlay */
    #endscreen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0,0,0,0.82);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      text-align: center;
      padding: 2rem;
    }

    #endscreen.visible { display: flex; }

    #endscreen h2 {
      font-size: 2rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #endscreen .end-score { font-size: 1.2rem; color: #a060ff; }

    #endscreen button {
      margin-top: 0.5rem;
      background: transparent;
      border: 1px solid #a060ff;
      color: #a060ff;
      padding: 0.5rem 1.8rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }

    #endscreen button:hover { background: rgba(160,96,255,0.15); }
  </style>
</head>
<body>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-group">
      <div class="hud-stat">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="hud-score">0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">Level</span>
        <span class="hud-value level" id="hud-level">1</span>
      </div>
    </div>
    <span style="font-size:0.8rem;letter-spacing:0.1em;opacity:0.7;">MATRIX OF CONSCIENCE</span>
    <div class="hud-group">
      <div class="hud-stat">
        <span class="hud-label">Moves</span>
        <span class="hud-value moves" id="hud-moves">30</span>
      </div>
      <a class="back-link" href="../">← Home</a>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- End screen -->
  <div id="endscreen">
    <h2 id="end-title">Game Over</h2>
    <div class="end-score" id="end-score"></div>
    <button id="end-restart">Play Again</button>
  </div>

  <!-- CERT bottom bar -->
  <div id="cert-bar">
    <div class="cert-seg c" id="cert-c" title="Creativity"></div>
    <div class="cert-seg e" id="cert-e" title="Empathy"></div>
    <div class="cert-seg r" id="cert-r" title="Relief"></div>
    <div class="cert-seg t" id="cert-t" title="Trust"></div>
  </div>

  <script src="./matrix-of-conscience.js"></script>
</body>
</html>
