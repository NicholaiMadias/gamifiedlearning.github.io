    .back-link:hover { color: var(--neon-blue); }

    /* 3D glowing star */
    .glow-star {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(251,191,36,0.35), rgba(188,19,254,0.12) 55%, rgba(0,242,255,0.08) 80%, rgba(0,0,0,0) 100%);
      box-shadow:
        0 0 18px rgba(188,19,254,0.24),
        0 0 32px rgba(0,242,255,0.12),
        inset 0 0 18px rgba(251,191,36,0.14);
      transform-style: preserve-3d;
      animation: starSpin 7s linear infinite;
      border: 1px solid rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .glow-star::before {
      content: '';
      position: absolute;
      inset: -20%;
      background: conic-gradient(from 220deg, rgba(0,242,255,0.0), rgba(0,242,255,0.25), rgba(188,19,254,0.0), rgba(251,191,36,0.28), rgba(0,242,255,0.0));
      filter: blur(8px);
      opacity: 0.9;
      animation: starSheen 2.8s ease-in-out infinite;
      transform: translateZ(-10px);
    }
    .glow-star svg {
      width: 26px;
      height: 26px;
      filter: drop-shadow(0 0 14px rgba(251,191,36,0.6)) drop-shadow(0 0 22px rgba(188,19,254,0.35));
      transform: translateZ(18px);
      position: relative;
      z-index: 1;
    }
    @keyframes starSpin {
      0%   { transform: rotateX(18deg) rotateY(0deg) rotateZ(0deg); }
      100% { transform: rotateX(18deg) rotateY(360deg) rotateZ(360deg); }
    }
    @keyframes starSheen {
      0%, 100% { opacity: 0.75; transform: rotate(0deg) translateZ(-10px); }
      50%      { opacity: 1; transform: rotate(180deg) translateZ(-10px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .glow-star { animation: none; }
      .glow-star::before { animation: none; }
    }

    /* Certificate cards */
    .cert-list { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

    .cert-card {
      background: rgba(22,27,34,0.9); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius); padding: 1.25rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      transition: border-color 0.2s;
    }
    .cert-card:hover { border-color: rgba(0,242,255,0.3); }

    .cert-meta { flex: 1; min-width: 0; }
    .cert-game { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; }
    .cert-player { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }
    .cert-player span { color: var(--neon-blue); font-weight: 600; }
    .cert-detail { font-size: 0.7rem; color: #475569; margin-top: 0.25rem; }
    .cert-id { font-size: 0.65rem; color: #334155; font-family: monospace; margin-top: 0.2rem; }

    .cert-icon { font-size: 2.5rem; flex-shrink: 0; }

    /* Empty state */
    .empty-state {
      max-width: 860px; margin: 4rem auto; text-align: center;
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
    .empty-state h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--muted); margin-bottom: 0.5rem; }

    .play-btn {

    }
    .play-btn:hover { background: rgba(0,242,255,0.08); border-color: var(--neon-blue); }

    /* Divider */
    .count-label { max-width: 860px; margin: 0 auto 0.75rem; font-size: 0.65rem; color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; }
