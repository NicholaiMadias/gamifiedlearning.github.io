<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a14;
      --surface: rgba(16,18,30,0.95);
      --border:  rgba(126,255,216,0.12);
      --accent:  #7effd8;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Skip link ── */
    .skip-link {
      position: absolute;
      left: -9999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .skip-link:focus {
      position: static;
      width: auto;
      height: auto;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: #0a0a14;
      font-weight: 700;
      z-index: 999;
    }

    /* ── Top nav ── */
    .topnav {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .topnav a {
      color: var(--accent);
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }
    .topnav a:hover { text-decoration: underline; }
    .topnav-sep { color: var(--muted); }

    /* ── Header ── */
    .ma-header {
      width: 100%;
      max-width: 900px;
      padding: 1.5rem 1.5rem 0.5rem;
      text-align: center;
    }
    .ma-overline {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .ma-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }
    .ma-subtitle {
      font-size: 0.925rem;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }

    /* ── Game grid ── */
    #matrix-app-grid {
      width: 100%;
      max-width: 900px;
      padding: 0 1.5rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* ── Cards (populated by MatrixApp.jsx) ── */
    .ma-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .ma-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .ma-card.card-expose::before { background: radial-gradient(circle at 30% 20%, rgba(239,68,68,0.14), transparent 60%); }
    .ma-card.card-lamp::before   { background: radial-gradient(circle at 30% 20%, rgba(251,191,36,0.14), transparent 60%); }
    .ma-card:hover { transform: translateY(-5px); box-shadow: 0 18px 48px rgba(0,0,0,0.45); border-color: var(--accent); }
    .ma-card:hover::before { opacity: 1; }
    .ma-card:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

    .ma-card-hero {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }
    .ma-card-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      flex: 1;
    }
    .ma-card-icon { font-size: 2.2rem; line-height: 1; }
    .ma-card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
    }
    .ma-card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .ma-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      margin-top: auto;
      align-self: flex-start;
    }
    .badge-red   { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.35); }
    .badge-amber { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.35); }

    .ma-btn {
      display: inline-block;
      padding: 0.65rem 1.3rem;
      border-radius: 9px;
      font-weight: 700;
      font-size: 0.875rem;
      align-self: flex-start;
      min-height: 44px;
      line-height: 1.8;
    }
    .btn-red   { background: #f87171; color: #1a0505; }
    .btn-amber { background: #fbbf24; color: #1a1200; }

    /* ── Footer ── */
    .ma-footer {
      width: 100%;
      max-width: 900px;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .ma-footer a { color: var(--accent); text-decoration: none; }
    .ma-footer a:hover { text-decoration: underline; }

    @media (prefers-reduced-motion: reduce) {
      .ma-card, .ma-card::before { transition: none; }
    }
  </style>
